<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatApp - Nhan tin truc tuyen | @Duong243</title>
    <meta name="description" content="ChatApp - Ung dung nhan tin truc tuyen mien phi. Chat voi ban be qua ID.">
    <style>
        :root {
            --primary: #0084ff;
            --white: #ffffff;
            --text: #1a1a1a;
            --text-secondary: #65676b;
            --border: #e4e6eb;
            --online: #31a24c;
            --message-sent: #0084ff;
            --message-received: #e4e6eb;
            --admin-color: #ff4444;
            --like-color: #e91e63;
            --follow-color: #4caf50;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .auth-container {
            width: 100%; max-width: 420px; background: var(--white);
            border-radius: 20px; padding: 35px 28px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4); text-align: center;
            max-height: 95vh; overflow-y: auto;
        }
        .auth-container.hidden { display: none; }
        .auth-logo {
            width: 65px; height: 65px; background: linear-gradient(135deg, #0084ff, #00c6ff);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 15px; font-size: 28px; color: #fff; font-weight: 700;
        }
        .auth-title { font-size: 24px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
        .auth-subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; }
        .auth-tabs { display: flex; margin-bottom: 20px; background: #f0f2f5; border-radius: 10px; padding: 3px; }
        .auth-tab { flex: 1; padding: 10px; border: none; background: transparent; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; color: var(--text-secondary); }
        .auth-tab.active { background: #fff; color: var(--primary); }
        .input-group { text-align: left; margin-bottom: 10px; }
        .input-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; }
        .input-group input { width: 100%; padding: 11px 14px; border: 2px solid var(--border); border-radius: 10px; font-size: 14px; outline: none; font-family: inherit; }
        .input-group input:focus { border-color: var(--primary); }
        .btn-auth { width: 100%; padding: 13px; background: var(--primary); color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 8px; }
        .btn-auth:hover { background: #0066cc; }
        .auth-error { color: #ff4444; font-size: 12px; text-align: center; margin-top: 6px; display: none; }
        .auth-error.show { display: block; }
        .auth-info { background: #e8f5e9; padding: 10px 14px; border-radius: 10px; font-size: 11px; color: #2e7d32; margin-top: 15px; text-align: left; line-height: 1.5; }
        .app-container { width: 100%; max-width: 850px; height: 95vh; background: var(--white); border-radius: 20px; display: flex; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
        .app-container.hidden { display: none; }
        .sidebar { width: 300px; background: #f8f9fa; border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 15px 18px; border-bottom: 1px solid var(--border); background: var(--white); display: flex; justify-content: space-between; align-items: center; }
        .sidebar-header h2 { font-size: 18px; font-weight: 700; color: var(--primary); }
        .sidebar-nav { display: flex; border-bottom: 1px solid var(--border); background: #fff; }
        .sidebar-nav-btn { flex: 1; padding: 8px; border: none; background: transparent; cursor: pointer; font-size: 10px; font-weight: 600; color: var(--text-secondary); border-bottom: 2px solid transparent; }
        .sidebar-nav-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
        .user-info { display: flex; align-items: center; gap: 8px; padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--white); }
        .avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 16px; flex-shrink: 0; position: relative; }
        .avatar .online-dot { position: absolute; bottom: 1px; right: 1px; width: 10px; height: 10px; background: var(--online); border-radius: 50%; border: 2px solid #fff; }
        .user-name { font-weight: 600; font-size: 13px; color: var(--text); }
        .user-id-display { font-size: 10px; color: var(--text-secondary); }
        .admin-tag { display: inline-block; background: var(--admin-color); color: #fff; padding: 1px 6px; border-radius: 8px; font-size: 9px; font-weight: 700; margin-left: 3px; }
        .btn-logout { margin-left: auto; background: none; border: none; color: #ff4444; cursor: pointer; font-size: 18px; padding: 4px; }
        .contact-list { flex: 1; overflow-y: auto; padding: 8px; }
        .section-title { font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; padding: 8px 12px 4px; }
        .contact-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 12px; cursor: pointer; transition: all 0.2s; margin-bottom: 2px; position: relative; }
        .contact-item:hover { background: #e8eaed; }
        .contact-item.active { background: #e7f3ff; }
        .contact-item:hover .contact-delete-btn { display: flex; }
        .contact-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; color: #fff; }
        .contact-info { flex: 1; min-width: 0; }
        .contact-name { font-weight: 600; font-size: 13px; color: var(--text); }
        .contact-last-msg { font-size: 11px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
        .contact-meta { text-align: right; flex-shrink: 0; }
        .contact-time { font-size: 10px; color: var(--text-secondary); }
        .contact-delete-btn { display: none; position: absolute; right: 8px; top: 50%; transform: translateY(-50%); width: 24px; height: 24px; border-radius: 50%; background: #ff4444; color: #fff; border: none; cursor: pointer; font-size: 12px; align-items: center; justify-content: center; z-index: 5; }
        .add-contact-area { padding: 8px 12px; border-top: 1px solid var(--border); display: flex; gap: 6px; background: #fff; }
        .add-contact-area input { flex: 1; padding: 9px 12px; border: 2px solid var(--border); border-radius: 18px; font-size: 12px; outline: none; font-family: inherit; }
        .btn-add { padding: 9px 14px; background: var(--primary); color: #fff; border: none; border-radius: 18px; font-weight: 600; font-size: 12px; cursor: pointer; white-space: nowrap; font-family: inherit; }
        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--white); }
        .chat-header { padding: 12px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; background: var(--white); flex-wrap: wrap; }
        .chat-header .contact-title { font-weight: 700; font-size: 15px; color: var(--text); cursor: pointer; }
        .chat-header .contact-subtitle { font-size: 11px; color: var(--text-secondary); }
        .chat-header-actions { margin-left: auto; display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
        .btn-sm { padding: 5px 12px; border-radius: 14px; border: none; font-size: 10px; font-weight: 600; cursor: pointer; font-family: inherit; }
        .btn-clear { background: #666; color: #fff; }
        .btn-delete-contact { background: #ff9800; color: #fff; }
        .btn-ban { background: #ff0000; color: #fff; }
        .btn-unban { background: #4caf50; color: #fff; }
        .btn-follow { background: var(--follow-color); color: #fff; }
        .btn-unfollow { background: #999; color: #fff; }
        .btn-like { background: var(--like-color); color: #fff; }
        .btn-unlike { background: #999; color: #fff; }
        .messages-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 6px; background: #f5f6f8; }
        .message-wrapper { display: flex; gap: 6px; max-width: 75%; animation: slideIn 0.3s ease; position: relative; }
        .message-wrapper:hover .msg-delete-btn { display: flex; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .message-wrapper.sent { align-self: flex-end; flex-direction: row-reverse; }
        .message-wrapper.received { align-self: flex-start; }
        .msg-delete-btn { display: none; position: absolute; top: -6px; width: 18px; height: 18px; border-radius: 50%; background: #ff4444; color: #fff; border: none; cursor: pointer; font-size: 8px; align-items: center; justify-content: center; z-index: 5; }
        .message-wrapper.sent .msg-delete-btn { right: -6px; }
        .message-wrapper.received .msg-delete-btn { left: -6px; }
        .msg-avatar { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; align-self: flex-end; color: #fff; }
        .message-bubble { padding: 8px 12px; border-radius: 16px; font-size: 13px; line-height: 1.4; word-wrap: break-word; }
        .message-wrapper.sent .message-bubble { background: var(--message-sent); color: #fff; border-bottom-right-radius: 4px; }
        .message-wrapper.received .message-bubble { background: #fff; color: var(--text); border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
        .message-time { font-size: 9px; margin-top: 3px; padding: 0 3px; }
        .message-wrapper.sent .message-time { text-align: right; color: rgba(255,255,255,0.7); }
        .message-wrapper.received .message-time { color: #999; }
        .date-separator { text-align: center; margin: 12px 0; }
        .date-separator span { background: #fff; padding: 4px 12px; border-radius: 12px; font-size: 11px; color: var(--text-secondary); font-weight: 600; box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
        .empty-chat { text-align: center; color: #999; margin-top: 60px; }
        .empty-chat .empty-icon { font-size: 50px; }
        .empty-chat .empty-text { margin-top: 12px; font-size: 14px; }
        .input-area { padding: 10px 16px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 8px; background: var(--white); }
        .input-area input { flex: 1; padding: 10px 16px; border: 2px solid var(--border); border-radius: 22px; font-size: 13px; outline: none; background: #f0f2f5; font-family: inherit; }
        .input-area input:focus { border-color: var(--primary); background: #fff; }
        .btn-icon { width: 38px; height: 38px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
        .btn-send { background: var(--primary); color: #fff; }
        .toast { position: fixed; top: 15px; right: 15px; padding: 8px 15px; border-radius: 8px; color: #fff; font-weight: 600; font-size: 12px; z-index: 300; animation: toastIn 0.3s ease; }
        @keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast-success { background: #4caf50; }
        .toast-error { background: #f44336; }
        .profile-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 200; }
        .profile-overlay.show { display: flex; }
        .profile-card { background: #fff; border-radius: 16px; padding: 25px; width: 90%; max-width: 380px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.4); max-height: 80vh; overflow-y: auto; }
        .profile-avatar { width: 75px; height: 75px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 30px; margin: 0 auto 12px; }
        .profile-name { font-size: 20px; font-weight: 700; }
        .profile-username { font-size: 16px; color: #0084ff; font-weight: 700; }
        .profile-bio { font-size: 12px; color: #555; background: #f5f5f5; padding: 10px; border-radius: 8px; margin: 8px 0; }
        .profile-stats { display: flex; justify-content: center; gap: 20px; margin: 12px 0; padding: 10px; background: #f8f9fa; border-radius: 10px; }
        .profile-stat { text-align: center; }
        .profile-stat .stat-num { font-size: 18px; font-weight: 700; }
        .profile-stat .stat-label { font-size: 10px; color: #666; }
        .profile-actions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 12px; }
        .profile-actions button { padding: 8px 16px; border-radius: 16px; border: none; font-weight: 600; cursor: pointer; font-size: 12px; font-family: inherit; }
        .btn-close-profile { background: #e0e0e0; color: #333; }
        .btn-follow-action { background: var(--follow-color); color: #fff; }
        .btn-unfollow-action { background: #999; color: #fff; }
        .btn-like-action { background: var(--like-color); color: #fff; }
        .btn-unlike-action { background: #999; color: #fff; }
        .btn-edit-profile { background: var(--primary); color: #fff; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 250; }
        .modal-overlay.show { display: flex; }
        .modal { background: #fff; border-radius: 14px; padding: 22px; width: 90%; max-width: 350px; text-align: center; }
        .modal h3 { margin-bottom: 8px; font-size: 16px; }
        .modal p { font-size: 12px; color: #666; margin-bottom: 15px; }
        .modal-buttons { display: flex; gap: 8px; justify-content: center; }
        .modal-buttons button { padding: 8px 18px; border-radius: 16px; border: none; font-weight: 600; cursor: pointer; font-size: 12px; font-family: inherit; }
        .btn-confirm-danger { background: #ff4444; color: #fff; }
        .btn-cancel-modal { background: #e0e0e0; color: #333; }
        @media (max-width: 768px) {
            .sidebar { width: 100%; display: none; }
            .sidebar.show { display: flex; position: absolute; inset: 0; z-index: 50; }
            .chat-area { width: 100%; }
            .app-container { height: 100vh; border-radius: 0; }
            .message-wrapper { max-width: 85%; }
            .auth-container { max-width: 100%; height: 100vh; border-radius: 0; }
        }
    </style>
</head>
<body>

<div class="auth-container" id="authContainer">
    <div class="auth-logo">CH</div>
    <div class="auth-title">ChatApp</div>
    <div class="auth-subtitle">Server chung - Moi nguoi deu chat duoc!</div>
    <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin">Dang nhap</button>
        <button class="auth-tab" id="tabRegister">Dang ky</button>
    </div>
    <div class="auth-error" id="authError"></div>
    <form id="loginForm" autocomplete="off" style="display:flex;flex-direction:column;gap:8px;">
        <div class="input-group"><label>Ten dang nhap</label><input type="text" id="loginUsername" placeholder="Nhap ten dang nhap..." required></div>
        <div class="input-group"><label>Mat khau</label><input type="password" id="loginPassword" placeholder="Nhap mat khau..." required></div>
        <button type="submit" class="btn-auth">Dang nhap</button>
    </form>
    <form id="registerForm" autocomplete="off" style="display:none;flex-direction:column;gap:8px;">
        <div class="input-group"><label>Ten hien thi</label><input type="text" id="regDisplayName" placeholder="Ten hien thi..." required></div>
        <div class="input-group"><label>Ten dang nhap</label><input type="text" id="regUsername" placeholder="Chon ten dang nhap..." required></div>
        <div class="input-group"><label>Mat khau</label><input type="password" id="regPassword" placeholder="Tao mat khau..." required minlength="4"></div>
        <button type="submit" class="btn-auth">Dang ky</button>
    </form>
    <div class="auth-info">Dang ky de bat dau!<br>ID cua ban: <strong>@tennguoidung</strong><br>Server chung - Tat ca moi nguoi deu thay</div>
</div>

<div class="app-container hidden" id="appContainer">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header"><h2>ChatApp</h2><span style="font-size:10px;">ID: <b id="myIdDisplay">---</b></span></div>
        <div class="user-info" id="myProfileBtn">
            <div class="avatar" id="myAvatar">U<div class="online-dot"></div></div>
            <div><div class="user-name" id="myName">User</div><div class="user-id-display">ID: <span id="myIdSmall">---</span></div></div>
            <button class="btn-logout" id="btnLogout">X</button>
        </div>
        <div class="sidebar-nav">
            <button class="sidebar-nav-btn active" data-tab="chats">Chat</button>
            <button class="sidebar-nav-btn" data-tab="following">Theo doi</button>
        </div>
        <div class="contact-list" id="contactList"></div>
        <div class="add-contact-area">
            <input type="text" id="addContactInput" placeholder="Nhap @ID ban be..." autocomplete="off">
            <button class="btn-add" id="btnAddContact">Them</button>
        </div>
    </div>
    <div class="chat-area">
        <div class="chat-header">
            <div class="avatar" style="width:34px;height:34px;font-size:14px;" id="chatAvatar">#</div>
            <div><div class="contact-title" id="chatContactName">Chon nguoi de chat</div><div class="contact-subtitle" id="chatContactId"></div></div>
            <div class="chat-header-actions">
                <button class="btn-sm btn-follow" id="btnFollow" style="display:none;">Theo doi</button>
                <button class="btn-sm btn-like" id="btnLike" style="display:none;">Thich</button>
                <button class="btn-sm btn-clear" id="btnClear" style="display:none;">Xoa Chat</button>
                <button class="btn-sm btn-delete-contact" id="btnDelete" style="display:none;">Xoa LH</button>
                <span id="adminBtns"></span>
            </div>
        </div>
        <div class="messages-container" id="messagesContainer"><div class="empty-chat"><div class="empty-icon">CH</div><div class="empty-text">Chon nguoi de chat</div></div></div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Nhap tin nhan..." disabled>
            <button class="btn-icon btn-send" id="btnSend">></button>
        </div>
    </div>
</div>

<div class="profile-overlay" id="profileOverlay"><div class="profile-card" id="profileCard"></div></div>
<div class="modal-overlay" id="confirmModal"><div class="modal"><h3>Xac nhan</h3><p id="modalMessage"></p><div class="modal-buttons"><button class="btn-cancel-modal" id="btnModalCancel">Huy</button><button class="btn-confirm-danger" id="btnModalConfirm">Xoa</button></div></div></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAgUzGUXq73uE7W23RD_8rj0dldpw8kb64",
        authDomain: "chatapp-duong243-528c2.firebaseapp.com",
        databaseURL: "https://chatapp-duong243-528c2-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "chatapp-duong243-528c2",
        storageBucket: "chatapp-duong243-528c2.firebasestorage.app",
        messagingSenderId: "620925798301",
        appId: "1:620925798301:web:a645041b9ef3db5cf0d174"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let currentUser = null;
    let currentContact = null;
    let sidebarTab = 'chats';
    let allUsers = {};
    let allMessages = {};
    let allContacts = {};
    let allFollows = {};
    let allLikes = {};
    let allBanned = {};

    // Load data from Firebase
    async function loadData() {
        const snap = await get(ref(db, '/'));
        if (snap.exists()) {
            const data = snap.val();
            allUsers = data.users || {};
            allMessages = data.messages || {};
            allContacts = data.contacts || {};
            allFollows = data.follows || {};
            allLikes = data.likes || {};
            allBanned = data.banned || {};
        }
    }

    async function saveData() {
        await set(ref(db, '/'), {
            users: allUsers,
            messages: allMessages,
            contacts: allContacts,
            follows: allFollows,
            likes: allLikes,
            banned: allBanned
        });
    }

    function st(msg, tp) {
        const t = document.createElement('div');
        t.className = 'toast toast-' + (tp || 'info');
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }

    function gc(s) {
        const colors = ['#0084ff','#ff6b6b','#4ecdc4','#ffd93d','#6c5ce7','#a29bfe','#fd79a8','#00b894'];
        let h = 0;
        for (let i = 0; i < s.length; i++) h = s.charCodeAt(i) + ((h << 5) - h);
        return colors[Math.abs(h) % colors.length];
    }

    function ft(ts) {
        const d = new Date(ts);
        return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
    }

    function ck(a, b) {
        return [a, b].sort().join('|');
    }

    function fui(uid) {
        for (let k in allUsers) if (allUsers[k].id === uid) return allUsers[k];
        return null;
    }

    function findUser(query) {
        query = query.trim();
        if (query.startsWith('@')) {
            for (let k in allUsers) if (allUsers[k].id === query) return allUsers[k];
        }
        for (let k in allUsers) if (allUsers[k].id === '@' + query || allUsers[k].un === query) return allUsers[k];
        return null;
    }

    // Auth
    document.getElementById('tabLogin').addEventListener('click', () => {
        document.getElementById('tabLogin').classList.add('active');
        document.getElementById('tabRegister').classList.remove('active');
        document.getElementById('loginForm').style.display = 'flex';
        document.getElementById('registerForm').style.display = 'none';
    });

    document.getElementById('tabRegister').addEventListener('click', () => {
        document.getElementById('tabRegister').classList.add('active');
        document.getElementById('tabLogin').classList.remove('active');
        document.getElementById('registerForm').style.display = 'flex';
        document.getElementById('loginForm').style.display = 'none';
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        await loadData();
        const un = document.getElementById('loginUsername').value.trim();
        const pw = document.getElementById('loginPassword').value.trim();
        if (!un || !pw) return st('Nhap day du!', 'error');
        const user = allUsers[un];
        if (!user) return st('Tai khoan khong ton tai!', 'error');
        if (user.pw !== pw) return st('Sai mat khau!', 'error');
        if (allBanned[user.id]) return st('Tai khoan bi cam!', 'error');
        currentUser = user;
        allContacts[user.id] = allContacts[user.id] || [];
        allFollows[user.id] = allFollows[user.id] || [];
        showApp();
        st('Chao ' + user.dn + '!', 'success');
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        await loadData();
        const dn = document.getElementById('regDisplayName').value.trim();
        const un = document.getElementById('regUsername').value.trim();
        const pw = document.getElementById('regPassword').value;
        if (!dn || !un || !pw) return st('Nhap day du!', 'error');
        if (pw.length < 4) return st('Mat khau >= 4 ky tu!', 'error');
        if (allUsers[un]) return st('Ten da ton tai!', 'error');
        const uid = '@' + un;
        allUsers[un] = { id: uid, un, dn, pw, av: dn.charAt(0).toUpperCase(), isAd: false, bio: '', ct: Date.now() };
        allContacts[uid] = [];
        allFollows[uid] = [];
        allLikes[uid] = [];
        await saveData();
        currentUser = allUsers[un];
        showApp();
        st('Dang ky thanh cong! ID: ' + uid, 'success');
    });

    function showApp() {
        document.getElementById('authContainer').classList.add('hidden');
        document.getElementById('appContainer').classList.remove('hidden');
        document.getElementById('myName').textContent = currentUser.dn;
        if (currentUser.isAd) {
            document.getElementById('myName').innerHTML += '<span class="admin-tag">ADMIN</span>';
            document.getElementById('myAvatar').classList.add('admin-avatar');
        }
        document.getElementById('myAvatar').textContent = currentUser.av;
        document.getElementById('myAvatar').style.background = currentUser.isAd ? '#f44' : gc(currentUser.id);
        document.getElementById('myIdDisplay').textContent = currentUser.id;
        document.getElementById('myIdSmall').textContent = currentUser.id;
        renderContacts();
    }

    async function renderContacts() {
        await loadData();
        const lst = document.getElementById('contactList');
        let html = '';
        if (sidebarTab === 'following') {
            const following = allFollows[currentUser.id] || [];
            html = '<div class="section-title">Theo doi (' + following.length + ')</div>';
            following.forEach(uid => {
                const u = fui(uid);
                if (u) html += buildItem(u);
            });
        } else {
            const contacts = allContacts[currentUser.id] || [];
            html = '<div class="section-title">Ban be (' + contacts.length + ')</div>';
            contacts.forEach(uid => {
                const u = fui(uid);
                if (u) html += buildItem(u);
            });
        }
        lst.innerHTML = html;
        lst.querySelectorAll('.contact-item').forEach(it => {
            it.addEventListener('click', function(e) {
                if (e.target.closest('.contact-delete-btn')) return;
                selectContact(this.dataset.c);
            });
        });
        lst.querySelectorAll('.contact-delete-btn').forEach(b => {
            b.addEventListener('click', async function(e) {
                e.stopPropagation();
                const cid = this.dataset.dc;
                allContacts[currentUser.id] = (allContacts[currentUser.id]||[]).filter(c => c !== cid);
                if (allContacts[cid]) allContacts[cid] = allContacts[cid].filter(c => c !== currentUser.id);
                await saveData();
                if (currentContact === cid) { currentContact = null; resetChat(); }
                renderContacts();
            });
        });
    }

    function buildItem(u) {
        const key = ck(currentUser.id, u.id);
        const msgs = allMessages[key] || [];
        const last = msgs.length > 0 ? msgs[msgs.length-1] : null;
        return `<div class="contact-item${currentContact===u.id?' active':''}" data-c="${u.id}">
            <div class="contact-avatar" style="background:${u.isAd?'#f44':gc(u.id)}">${u.av}</div>
            <div class="contact-info"><div class="contact-name">${u.dn}${u.isAd?' <span class="admin-tag">ADMIN</span>':''}</div>
            <div class="contact-last-msg">${last?last.text.substring(0,25):'Chua co tin nhan'}</div></div>
            <div class="contact-meta"><div class="contact-time">${last?ft(last.time):''}</div></div>
            <button class="contact-delete-btn" data-dc="${u.id}">X</button></div>`;
    }

    function selectContact(cid) {
        currentContact = cid;
        const ct = fui(cid);
        if (!ct) return;
        document.getElementById('chatContactName').textContent = ct.dn;
        if (ct.isAd) document.getElementById('chatContactName').innerHTML += ' <span class="admin-tag">ADMIN</span>';
        document.getElementById('chatContactId').textContent = 'ID: ' + ct.id;
        document.getElementById('chatAvatar').textContent = ct.av;
        document.getElementById('chatAvatar').style.background = ct.isAd ? '#f44' : gc(ct.id);
        document.getElementById('messageInput').disabled = false;
        document.getElementById('messageInput').focus();
        document.getElementById('btnClear').style.display = 'inline-block';
        document.getElementById('btnDelete').style.display = 'inline-block';
        updateHeaderButtons();
        renderMessages();
        renderContacts();
    }

    function resetChat() {
        document.getElementById('chatContactName').textContent = 'Chon nguoi';
        document.getElementById('chatContactId').textContent = '';
        document.getElementById('chatAvatar').textContent = '#';
        document.getElementById('messageInput').disabled = true;
        document.getElementById('messagesContainer').innerHTML = '<div class="empty-chat"><div class="empty-icon">CH</div><div class="empty-text">Chon nguoi de chat</div></div>';
        ['btnClear','btnDelete','btnFollow','btnLike'].forEach(id => document.getElementById(id).style.display='none');
    }

    function updateHeaderButtons() {
        const fb = document.getElementById('btnFollow');
        fb.style.display = 'inline-block';
        const isFollowing = (allFollows[currentUser.id]||[]).indexOf(currentContact) >= 0;
        fb.textContent = isFollowing ? 'Bo theo doi' : 'Theo doi';
        fb.className = 'btn-sm ' + (isFollowing ? 'btn-unfollow' : 'btn-follow');

        const lb = document.getElementById('btnLike');
        lb.style.display = 'inline-block';
        const isLiked = (allLikes[currentContact]||[]).indexOf(currentUser.id) >= 0;
        lb.textContent = isLiked ? 'Bo thich' : 'Thich';
        lb.className = 'btn-sm ' + (isLiked ? 'btn-unlike' : 'btn-like');
    }

    function renderMessages() {
        const container = document.getElementById('messagesContainer');
        if (!currentContact) { container.innerHTML = '<div class="empty-chat">Chon nguoi</div>'; return; }
        const key = ck(currentUser.id, currentContact);
        const msgs = allMessages[key] || [];
        let html = '';
        if (msgs.length === 0) {
            const c = fui(currentContact);
            html = '<div class="empty-chat"><div class="empty-icon">CH</div><div class="empty-text">Chat voi ' + (c?c.dn:'...') + '</div></div>';
        } else {
            let lastDate = '';
            msgs.forEach(m => {
                const md = new Date(m.time).toLocaleDateString('vi-VN');
                if (md !== lastDate) {
                    lastDate = md;
                    const today = new Date().toLocaleDateString('vi-VN');
                    const yesterday = new Date(Date.now()-86400000).toLocaleDateString('vi-VN');
                    html += '<div class="date-separator"><span>' + (md===today?'Hom nay':md===yesterday?'Hom qua':md) + '</span></div>';
                }
                const sent = m.sid === currentUser.id;
                const s = sent ? currentUser : fui(m.sid);
                const ac = s ? (s.isAd?'#f44':gc(m.sid)) : '#999';
                html += `<div class="message-wrapper ${sent?'sent':'received'}" data-mid="${m.id}">
                    <button class="msg-delete-btn" data-dm="${m.id}">X</button>
                    <div class="msg-avatar" style="background:${ac}">${s?s.av:'?'}</div>
                    <div>${!sent&&s?`<div style="font-size:10px;color:#666;">${s.dn}</div>`:''}
                    <div class="message-bubble">${m.text.replace(/\n/g,'<br>')}</div>
                    <div class="message-time">${ft(m.time)}</div></div></div>`;
            });
        }
        container.innerHTML = html;
        container.querySelectorAll('.msg-delete-btn').forEach(b => {
            b.addEventListener('click', async function(e) {
                e.stopPropagation();
                const mid = this.dataset.dm;
                const key = ck(currentUser.id, currentContact);
                allMessages[key] = (allMessages[key]||[]).filter(m => m.id !== mid);
                await saveData();
                renderMessages();
            });
        });
        container.scrollTop = container.scrollHeight;
    }

    // Send message
    document.getElementById('btnSend').addEventListener('click', async () => {
        if (!currentUser || !currentContact) return;
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text) return;
        const key = ck(currentUser.id, currentContact);
        allMessages[key] = allMessages[key] || [];
        allMessages[key].push({ id: Date.now().toString(), sid: currentUser.id, sn: currentUser.dn, text, time: Date.now() });
        await saveData();
        input.value = '';
        renderMessages();
        renderContacts();
    });

    document.getElementById('messageInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') document.getElementById('btnSend').click();
    });

    // Add contact
    document.getElementById('btnAddContact').addEventListener('click', async () => {
        const input = document.getElementById('addContactInput');
        const query = input.value.trim();
        if (!query) return;
        const u = findUser(query);
        if (!u) return st('Khong tim thay!', 'error');
        if (u.id === currentUser.id) return st('Khong the tu them!', 'error');
        if ((allContacts[currentUser.id]||[]).indexOf(u.id) >= 0) return st('Da co!', 'info');
        allContacts[currentUser.id].push(u.id);
        allContacts[u.id] = allContacts[u.id] || [];
        if (allContacts[u.id].indexOf(currentUser.id) < 0) allContacts[u.id].push(currentUser.id);
        await saveData();
        input.value = '';
        renderContacts();
        st('Da them!', 'success');
    });

    // Clear chat
    document.getElementById('btnClear').addEventListener('click', async () => {
        const key = ck(currentUser.id, currentContact);
        allMessages[key] = [];
        await saveData();
        renderMessages();
    });

    // Delete contact
    document.getElementById('btnDelete').addEventListener('click', async () => {
        allContacts[currentUser.id] = (allContacts[currentUser.id]||[]).filter(c => c !== currentContact);
        if (allContacts[currentContact]) allContacts[currentContact] = allContacts[currentContact].filter(c => c !== currentUser.id);
        await saveData();
        currentContact = null;
        resetChat();
        renderContacts();
    });

    // Follow
    document.getElementById('btnFollow').addEventListener('click', async () => {
        allFollows[currentUser.id] = allFollows[currentUser.id] || [];
        const idx = allFollows[currentUser.id].indexOf(currentContact);
        if (idx >= 0) allFollows[currentUser.id].splice(idx, 1);
        else allFollows[currentUser.id].push(currentContact);
        await saveData();
        updateHeaderButtons();
    });

    // Like
    document.getElementById('btnLike').addEventListener('click', async () => {
        allLikes[currentContact] = allLikes[currentContact] || [];
        const idx = allLikes[currentContact].indexOf(currentUser.id);
        if (idx >= 0) allLikes[currentContact].splice(idx, 1);
        else allLikes[currentContact].push(currentUser.id);
        await saveData();
        updateHeaderButtons();
    });

    // Logout
    document.getElementById('btnLogout').addEventListener('click', () => {
        currentUser = null;
        currentContact = null;
        document.getElementById('appContainer').classList.add('hidden');
        document.getElementById('authContainer').classList.remove('hidden');
    });

    // Sidebar tabs
    document.querySelectorAll('.sidebar-nav-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.sidebar-nav-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            sidebarTab = this.dataset.tab;
            renderContacts();
        });
    });

    // Init admin
    (async () => {
        await loadData();
        if (!allUsers['admin']) {
            allUsers['admin'] = { id: '@admin', un: 'admin', dn: 'Admin', pw: '08112012', av: 'A', isAd: true, bio: 'Admin', ct: Date.now() };
            allContacts['@admin'] = [];
            allFollows['@admin'] = [];
            allLikes['@admin'] = [];
            await saveData();
        }
    })();
</script>
</body>
</html>
